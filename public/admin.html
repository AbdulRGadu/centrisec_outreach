<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Centrisec Outreach</title>
<style>
  :root {
    --bg: #0b1220; --panel: #111a2c; --panel-2: #16213a; --line: #24304d;
    --text: #e6ecf7; --muted: #8fa0bd; --accent: #10b981; --accent-2: #34d399;
    --warn: #f59e0b; --bad: #ef4444; --info: #60a5fa;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
  button { font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--text); border-radius: 8px; padding: 6px 12px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #04110b; font-weight: 600; }
  button.danger { border-color: #7f1d1d; color: #fca5a5; }
  button:disabled { opacity: .5; cursor: wait; }
  input, select, textarea { font: inherit; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { width: 100%; resize: vertical; }
  .hidden { display: none !important; }
  .muted { color: var(--muted); }
  .small { font-size: 12px; }

  /* Login */
  #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  #login form { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 28px; width: min(92vw, 380px); display: flex; flex-direction: column; gap: 12px; }
  #login h1 { margin: 0 0 4px; font-size: 18px; }

  /* Layout */
  header { padding: 14px 20px 0; border-bottom: 1px solid var(--line); background: var(--panel);
    position: sticky; top: 0; z-index: 5; }
  .head-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; }
  header h1 span { color: var(--accent); }
  #stats { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .stat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px;
    padding: 3px 12px; font-size: 12px; color: var(--muted); }
  .stat b { color: var(--text); }
  .stat.warn { border-color: var(--warn); color: var(--warn); }
  nav { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }
  nav button { border: none; background: none; color: var(--muted); border-radius: 8px 8px 0 0;
    padding: 8px 14px; border-bottom: 2px solid transparent; }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }
  main { padding: 18px 20px 80px; max-width: 1200px; margin: 0 auto; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; background: var(--panel-2); }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--panel-2); }
  .table-wrap { overflow-x: auto; border-radius: 12px; }

  /* Chips */
  .chip { display: inline-block; padding: 1px 9px; border-radius: 999px; font-size: 11px;
    border: 1px solid var(--line); color: var(--muted); white-space: nowrap; }
  .st-new { color: var(--info); border-color: var(--info); }
  .st-scored, .st-drafted { color: var(--accent-2); border-color: var(--accent-2); }
  .st-approved, .st-queued, .st-sending { color: var(--warn); border-color: var(--warn); }
  .st-sent { color: var(--text); }
  .st-replied, .cl-interested, .cl-wants_demo, .cl-more_info, .cl-referral
    { color: var(--accent); border-color: var(--accent); font-weight: 600; }
  .st-bounced, .st-unsubscribed, .st-disqualified, .st-failed, .st-rejected,
  .cl-remove_me, .cl-not_interested, .cl-bounce { color: var(--bad); border-color: var(--bad); }
  .st-send_unknown { color: var(--warn); border-color: var(--warn); font-weight: 700; }
  .cl-not_now, .cl-out_of_office, .cl-unclear { color: var(--muted); }

  /* Drawer & modal */
  .overlay { position: fixed; inset: 0; background: rgba(3,7,15,.6); z-index: 8; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(96vw, 560px);
    background: var(--panel); border-left: 1px solid var(--line); z-index: 9;
    overflow-y: auto; padding: 18px 20px; }
  .modal { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; }
  .modal-box { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    width: min(96vw, 720px); max-height: 92vh; overflow-y: auto; padding: 20px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .grow { flex: 1; }
  .kv { display: grid; grid-template-columns: 130px 1fr; gap: 4px 10px; margin: 10px 0; }
  .kv div:nth-child(odd) { color: var(--muted); font-size: 12px; padding-top: 2px; }
  pre { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; white-space: pre-wrap; word-break: break-word; font: 13px/1.55 ui-monospace, Consolas, monospace; }
  .timeline { border-left: 2px solid var(--line); margin: 8px 0 8px 6px; padding-left: 14px; }
  .timeline > div { margin-bottom: 6px; font-size: 12px; }
  h2 { font-size: 15px; margin: 18px 0 8px; }
  h3 { font-size: 13px; margin: 14px 0 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--accent); color: var(--text);
    padding: 9px 16px; border-radius: 10px; z-index: 20; transition: opacity .3s; opacity: 0; pointer-events: none; }
  #toast.bad { border-color: var(--bad); }
  #toast.show { opacity: 1; }
  .empty { color: var(--muted); text-align: center; padding: 32px 0; }
</style>
</head>
<body>

<div id="login" class="hidden">
  <form id="login-form">
    <h1>Centrisec <span style="color:var(--accent)">Outreach</span></h1>
    <p class="muted small" style="margin:0">Enter the API key to open the dashboard.</p>
    <input id="login-token" type="password" placeholder="API key" autocomplete="off" required>
    <button class="primary" type="submit">Open dashboard</button>
    <p id="login-error" class="small hidden" style="color:var(--bad);margin:0"></p>
  </form>
</div>

<div id="app" class="hidden">
  <header>
    <div class="head-row">
      <h1>Centrisec <span>Outreach</span></h1>
      <div id="stats"></div>
      <button id="logout" class="small" title="Forget the API key on this browser">Lock</button>
    </div>
    <nav id="tabs">
      <button data-tab="pipeline" class="active">Pipeline</button>
      <button data-tab="drafts">Drafts</button>
      <button data-tab="replies">Replies</button>
      <button data-tab="suppression">Suppression</button>
      <button data-tab="add">Add lead</button>
    </nav>
  </header>
  <main>
    <section id="tab-pipeline">
      <div class="toolbar">
        <select id="f-status">
          <option value="">All statuses</option>
        </select>
        <select id="f-segment">
          <option value="">All segments</option>
        </select>
        <input id="f-q" placeholder="Search email, name, company…" style="min-width:220px">
        <button id="f-apply" class="primary">Filter</button>
        <button id="f-advance" title="Score new leads and draft fit ones now">Run pipeline now</button>
        <span id="lead-count" class="muted small"></span>
      </div>
      <div class="table-wrap"><table id="leads-table">
        <thead><tr>
          <th>Contact</th><th>Company</th><th>Segment</th><th>Fit</th><th>Status</th><th>Reply</th><th>Updated</th>
        </tr></thead>
        <tbody></tbody>
      </table></div>
      <div class="toolbar" style="margin-top:10px">
        <button id="page-prev">‹ Prev</button>
        <span id="page-info" class="muted small"></span>
        <button id="page-next">Next ›</button>
      </div>
    </section>

    <section id="tab-drafts" class="hidden">
      <div class="toolbar">
        <span class="muted">Every email is reviewed here before it can be sent.</span>
        <button id="drafts-refresh" style="margin-left:auto">Refresh</button>
      </div>
      <div id="drafts-list"></div>
    </section>

    <section id="tab-replies" class="hidden">
      <div class="toolbar">
        <select id="r-class">
          <option value="">All classifications</option>
        </select>
        <button id="replies-refresh" class="primary">Filter</button>
      </div>
      <div id="replies-list"></div>
    </section>

    <section id="tab-suppression" class="hidden">
      <div class="card">
        <div class="row">
          <select id="s-kind"><option value="email">email</option><option value="domain">domain</option></select>
          <input id="s-value" class="grow" placeholder="person@company.com or company.com">
          <input id="s-reason" placeholder="reason (optional)">
          <button id="s-add" class="primary">Suppress</button>
        </div>
        <p class="muted small" style="margin:8px 0 0">Suppressed addresses are blocked at intake, draft, approve, and send.</p>
      </div>
      <div class="table-wrap"><table id="sup-table">
        <thead><tr><th>Kind</th><th>Value</th><th>Reason</th><th>Added</th><th></th></tr></thead>
        <tbody></tbody>
      </table></div>
    </section>

    <section id="tab-add" class="hidden">
      <div class="card" style="max-width:560px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <input id="a-email" placeholder="Email *" style="grid-column:1/-1">
          <input id="a-first" placeholder="First name">
          <input id="a-last" placeholder="Last name">
          <input id="a-role" placeholder="Role (e.g. Head of IT)">
          <input id="a-company" placeholder="Company">
          <input id="a-website" placeholder="Company website">
          <input id="a-industry" placeholder="Industry (e.g. fintech)">
          <select id="a-source">
            <option value="manual">manual</option><option value="referral">referral</option>
            <option value="directory">directory</option><option value="linkedin">linkedin</option>
            <option value="csv">csv</option><option value="sheets">sheets</option><option value="form">form</option>
          </select>
          <textarea id="a-notes" placeholder="Notes (anything useful for scoring/personalization)" rows="3" style="grid-column:1/-1"></textarea>
        </div>
        <div class="row" style="margin-top:12px">
          <button id="a-save" class="primary">Add lead</button>
          <span id="a-result" class="muted small"></span>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="drawer-wrap" class="hidden">
  <div class="overlay" data-close="drawer"></div>
  <div class="drawer"><div id="drawer-content"></div></div>
</div>

<div id="modal-wrap" class="hidden">
  <div class="overlay" data-close="modal"></div>
  <div class="modal"><div class="modal-box" id="modal-content"></div></div>
</div>

<div id="toast"></div>

<script>
'use strict';

const LEAD_STATUSES = ['new','scored','drafted','approved','queued','sent','replied','bounced','unsubscribed','disqualified'];
const SEGMENTS = ['fintech','healthcare','school','logistics','saas','enterprise','sme','other'];
const CLASSIFICATIONS = ['interested','wants_demo','more_info','referral','not_now','not_interested','remove_me','out_of_office','bounce','unclear'];

const state = {
  token: localStorage.getItem('outreach_token') || '',
  tab: 'pipeline',
  page: 0,
  pageSize: 50,
  total: 0,
};

const $ = (sel) => document.querySelector(sel);

/* Safe DOM builder - all data goes through textContent, never innerHTML. */
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v === null || v === undefined) continue;
    if (k === 'class') node.className = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (const child of children.flat(Infinity)) {
    if (child === null || child === undefined || child === false) continue;
    node.append(child instanceof Node ? child : document.createTextNode(String(child)));
  }
  return node;
}

function toast(message, bad = false) {
  const t = $('#toast');
  t.textContent = message;
  t.className = bad ? 'bad show' : 'show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3500);
}

async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + state.token },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 401) { lock(); throw new Error('Unauthorized'); }
  let data = null;
  try { data = await res.json(); } catch { data = { ok: false, error: 'Bad response' }; }
  if (!res.ok && !(res.status === 202 && data && data.deferred)) {
    throw new Error((data && data.error) || ('HTTP ' + res.status));
  }
  return data;
}

function lock() {
  localStorage.removeItem('outreach_token');
  state.token = '';
  $('#app').classList.add('hidden');
  $('#login').classList.remove('hidden');
}

function fmtDate(s) {
  if (!s) return '';
  return String(s).replace('T', ' ').slice(0, 16);
}

function chip(value, prefix) {
  return el('span', { class: 'chip ' + prefix + String(value || '') }, String(value || '—'));
}

function closeLayer(which) {
  $('#' + which + '-wrap').classList.add('hidden');
}

document.addEventListener('click', (e) => {
  const close = e.target && e.target.getAttribute && e.target.getAttribute('data-close');
  if (close) closeLayer(close);
});

/* ---------- Stats ---------- */

async function refreshStats() {
  try {
    const s = await api('/stats');
    const chips = [
      el('span', { class: 'stat' }, 'Sends today ', el('b', {}, s.sendsToday + ' / ' + s.dailyCap)),
      el('span', { class: 'stat' }, 'Awaiting approval ', el('b', {}, s.draftsAwaiting)),
      el('span', { class: 'stat' }, 'New ', el('b', {}, s.pipeline.new), ' · Scored ', el('b', {}, s.pipeline.scored),
        ' · Sent ', el('b', {}, s.pipeline.sent), ' · Replied ', el('b', {}, s.pipeline.replied)),
    ];
    if (s.sendUnknown > 0) {
      chips.push(el('span', { class: 'stat warn' }, '⚠ ' + s.sendUnknown + ' send(s) need manual review'));
    }
    $('#stats').replaceChildren(...chips);
  } catch (err) {
    if (String(err.message) !== 'Unauthorized') toast('Stats failed: ' + err.message, true);
  }
}

/* ---------- Pipeline tab ---------- */

async function loadLeads() {
  const params = new URLSearchParams();
  const status = $('#f-status').value, segment = $('#f-segment').value, q = $('#f-q').value.trim();
  if (status) params.set('status', status);
  if (segment) params.set('segment', segment);
  if (q) params.set('q', q);
  params.set('limit', String(state.pageSize));
  params.set('offset', String(state.page * state.pageSize));
  const data = await api('/leads?' + params.toString());
  state.total = data.total;
  $('#lead-count').textContent = data.total + ' lead(s)';
  $('#page-info').textContent = 'Page ' + (state.page + 1) + ' of ' + Math.max(1, Math.ceil(data.total / state.pageSize));

  const tbody = $('#leads-table tbody');
  tbody.replaceChildren(...data.leads.map((l) =>
    el('tr', { onclick: () => openLead(l.id) },
      el('td', {},
        el('div', {}, [l.first_name, l.last_name].filter(Boolean).join(' ') || '—'),
        el('div', { class: 'muted small' }, l.email)),
      el('td', {}, l.company || '—', l.role ? el('div', { class: 'muted small' }, l.role) : null),
      el('td', {}, l.segment ? chip(l.segment, 'seg-') : '—'),
      el('td', {}, l.fit_score === null || l.fit_score === undefined ? '—' : String(l.fit_score)),
      el('td', {}, chip(l.status, 'st-')),
      el('td', {}, l.last_reply_classification ? chip(l.last_reply_classification, 'cl-') : '—'),
      el('td', { class: 'muted small' }, fmtDate(l.updated_at))
    )
  ));
  if (data.leads.length === 0) {
    tbody.replaceChildren(el('tr', {}, el('td', { colspan: '7', class: 'empty' }, 'No leads match.')));
  }
}

async function openLead(id) {
  const data = await api('/leads/' + id);
  const l = data.lead;
  const wrap = $('#drawer-content');

  const actions = [];
  if (['new', 'scored'].includes(l.status)) {
    actions.push(el('button', { onclick: () => leadAction('Scoring…', () => api('/leads/' + id + '/score', { method: 'POST' }), id) }, l.fit_score === null ? 'Score now' : 'Re-score'));
  }
  if (!['unsubscribed', 'bounced', 'disqualified'].includes(l.status)) {
    actions.push(el('button', { onclick: () => draftLead(id) }, 'Draft email'));
  }
  if (['sent', 'replied', 'disqualified'].includes(l.status)) {
    actions.push(el('button', { onclick: () => leadAction('Reactivating…', () => api('/leads/' + id, { method: 'PATCH', body: { action: 'reactivate' } }), id) }, 'Reactivate'));
  }
  if (!['disqualified', 'unsubscribed'].includes(l.status)) {
    actions.push(el('button', { class: 'danger', onclick: () => {
      if (confirm('Disqualify this lead?')) leadAction('Disqualifying…', () => api('/leads/' + id, { method: 'PATCH', body: { action: 'disqualify' } }), id);
    } }, 'Disqualify'));
  }

  const notes = el('textarea', { rows: '3', placeholder: 'Notes…' });
  notes.value = l.notes || '';

  wrap.replaceChildren(
    el('div', { class: 'row' },
      el('h2', { class: 'grow', style: 'margin:0' }, [l.first_name, l.last_name].filter(Boolean).join(' ') || l.email),
      chip(l.status, 'st-'),
      el('button', { onclick: () => closeLayer('drawer') }, '✕')),
    el('div', { class: 'kv' },
      el('div', {}, 'Email'), el('div', {}, l.email),
      el('div', {}, 'Company'), el('div', {}, l.company || '—'),
      el('div', {}, 'Role'), el('div', {}, l.role || '—'),
      el('div', {}, 'Industry'), el('div', {}, l.industry || '—'),
      el('div', {}, 'Segment'), el('div', {}, l.segment ? chip(l.segment, 'seg-') : '—'),
      el('div', {}, 'Fit score'), el('div', {}, l.fit_score === null ? '—' : l.fit_score + ' / 100'),
      el('div', {}, 'Fit reason'), el('div', {}, l.fit_reason || '—'),
      el('div', {}, 'Pain points'), el('div', {}, parsePain(l.pain_points)),
      el('div', {}, 'Source'), el('div', {}, l.source),
      el('div', {}, 'Created'), el('div', {}, fmtDate(l.created_at))),
    el('div', { class: 'row' }, ...actions),
    el('h3', {}, 'Notes'),
    notes,
    el('div', { class: 'row', style: 'margin-top:6px' },
      el('button', { onclick: async () => {
        await api('/leads/' + id, { method: 'PATCH', body: { notes: notes.value } });
        toast('Notes saved');
      } }, 'Save notes')),
    el('h3', {}, 'Messages'),
    data.messages.length === 0 ? el('p', { class: 'muted small' }, 'No messages yet.') :
      el('div', {}, ...data.messages.map((m) => el('div', { class: 'card' },
        el('div', { class: 'row' },
          el('b', {}, m.direction === 'outbound' ? '→ ' + (m.to_email || '') : '← ' + (m.from_email || '')),
          chip(m.status, 'st-'),
          m.classification ? chip(m.classification, 'cl-') : null,
          el('span', { class: 'muted small', style: 'margin-left:auto' }, fmtDate(m.created_at))),
        m.subject ? el('div', { class: 'small', style: 'margin-top:4px' }, el('b', {}, m.subject)) : null,
        el('details', {}, el('summary', { class: 'muted small' }, 'Body'), el('pre', {}, m.body || '')),
        m.status === 'draft' ? el('div', { class: 'row', style: 'margin-top:6px' },
          el('button', { class: 'primary', onclick: () => { closeLayer('drawer'); openDraft(m.id); } }, 'Review draft')) : null,
        m.error ? el('div', { class: 'small', style: 'color:var(--bad);margin-top:4px' }, m.error) : null))),
    el('h3', {}, 'Timeline'),
    el('div', { class: 'timeline' }, ...data.events.map((ev) =>
      el('div', {}, el('b', {}, ev.event), ' ', el('span', { class: 'muted' }, fmtDate(ev.created_at)),
        ev.detail ? el('div', { class: 'muted' }, ev.detail) : null)))
  );
  $('#drawer-wrap').classList.remove('hidden');
}

function parsePain(json) {
  try {
    const arr = JSON.parse(json || '[]');
    return Array.isArray(arr) && arr.length ? arr.join(' · ') : '—';
  } catch { return '—'; }
}

async function leadAction(label, fn, reopenId) {
  try {
    toast(label);
    await fn();
    toast('Done');
    await Promise.all([loadLeads(), refreshStats()]);
    if (reopenId) await openLead(reopenId);
  } catch (err) { toast(err.message, true); }
}

async function draftLead(id) {
  try {
    toast('Drafting…');
    await api('/leads/' + id + '/draft', { method: 'POST', body: {} });
    toast('Draft created');
    await Promise.all([loadLeads(), refreshStats()]);
    await openLead(id);
  } catch (err) {
    if (/force:true/.test(err.message) && confirm(err.message + '\n\nForce a new draft?')) {
      try {
        await api('/leads/' + id + '/draft', { method: 'POST', body: { force: true } });
        toast('Draft created');
        await openLead(id);
      } catch (err2) { toast(err2.message, true); }
    } else {
      toast(err.message, true);
    }
  }
}

/* ---------- Drafts tab ---------- */

async function loadDrafts() {
  const data = await api('/messages?status=draft');
  const list = $('#drafts-list');
  if (data.messages.length === 0) {
    list.replaceChildren(el('p', { class: 'empty' }, 'No drafts awaiting approval.'));
    return;
  }
  list.replaceChildren(...data.messages.map((m) => el('div', { class: 'card' },
    el('div', { class: 'row' },
      el('b', {}, m.lead_company || m.lead_email || m.to_email || ''),
      m.lead_segment ? chip(m.lead_segment, 'seg-') : null,
      m.lead_fit_score !== null && m.lead_fit_score !== undefined ? el('span', { class: 'chip' }, 'fit ' + m.lead_fit_score) : null,
      el('span', { class: 'muted small', style: 'margin-left:auto' }, fmtDate(m.updated_at))),
    el('div', { class: 'small muted' }, 'To: ' + (m.to_email || '')),
    el('div', { style: 'margin:6px 0 2px' }, el('b', {}, m.subject || '(no subject)')),
    el('div', { class: 'muted small' }, String(m.body || '').slice(0, 180) + (String(m.body || '').length > 180 ? '…' : '')),
    el('div', { class: 'row', style: 'margin-top:10px' },
      el('button', { class: 'primary', onclick: () => openDraft(m.id) }, 'Review'))
  )));
}

async function openDraft(messageId) {
  const data = await api('/messages?status=draft&limit=200');
  const m = data.messages.find((x) => x.id === messageId);
  if (!m) { toast('Draft no longer available', true); await loadDrafts(); return; }
  let footer = '';
  if (m.lead_id) {
    try { footer = (await api('/leads/' + m.lead_id)).footerPreview || ''; } catch { /* non-fatal */ }
  }

  const subject = el('input', { style: 'width:100%' });
  subject.value = m.subject || '';
  const body = el('textarea', { rows: '14' });
  body.value = m.body || '';
  const counter = el('span', { class: 'muted small' });
  const updateCount = () => {
    const words = body.value.trim().split(/\s+/).filter(Boolean).length;
    counter.textContent = words + ' words';
    counter.style.color = words < 120 || words > 180 ? 'var(--warn)' : 'var(--muted)';
  };
  body.addEventListener('input', updateCount);
  updateCount();

  const busy = (btn, fn) => async () => {
    btn.disabled = true;
    try { await fn(); } catch (err) { toast(err.message, true); } finally { btn.disabled = false; }
  };

  const saveBtn = el('button', {}, 'Save');
  saveBtn.addEventListener('click', busy(saveBtn, async () => {
    await api('/messages/' + m.id, { method: 'PATCH', body: { subject: subject.value, body: body.value } });
    toast('Draft saved');
  }));
  const approveBtn = el('button', { class: 'primary' }, 'Approve & queue');
  approveBtn.addEventListener('click', busy(approveBtn, async () => {
    await api('/messages/' + m.id, { method: 'PATCH', body: { subject: subject.value, body: body.value } });
    const r = await api('/messages/' + m.id + '/approve', { method: 'POST' });
    toast(r.queued ? 'Queued for sending' : 'Approved - will be queued shortly');
    closeLayer('modal');
    await Promise.all([loadDrafts(), refreshStats()]);
  }));
  const sendBtn = el('button', {}, 'Send now');
  sendBtn.addEventListener('click', busy(sendBtn, async () => {
    if (!confirm('Send this email immediately (subject to window and caps)?')) return;
    await api('/messages/' + m.id, { method: 'PATCH', body: { subject: subject.value, body: body.value } });
    const r = await api('/messages/' + m.id + '/send-now', { method: 'POST' });
    if (r.sent) toast(r.dryRun ? 'Sent (DRY RUN - no real email)' : 'Sent');
    else if (r.deferred) toast('Deferred: ' + r.reason + ' - will send automatically in ~' + Math.round(r.retryInSeconds / 60) + ' min');
    else toast(r.error || 'Not sent', true);
    closeLayer('modal');
    await Promise.all([loadDrafts(), refreshStats()]);
  }));
  const rejectBtn = el('button', { class: 'danger' }, 'Reject');
  rejectBtn.addEventListener('click', busy(rejectBtn, async () => {
    const reason = prompt('Reason (optional)?') || '';
    await api('/messages/' + m.id + '/reject', { method: 'POST', body: { reason } });
    toast('Rejected');
    closeLayer('modal');
    await Promise.all([loadDrafts(), refreshStats()]);
  }));

  $('#modal-content').replaceChildren(
    el('div', { class: 'row' },
      el('h2', { class: 'grow', style: 'margin:0' }, 'Review draft'),
      el('button', { onclick: () => closeLayer('modal') }, '✕')),
    el('p', { class: 'muted small', style: 'margin:6px 0 12px' },
      'To ' + (m.to_email || '') + (m.lead_company ? ' · ' + m.lead_company : '') + (m.lead_segment ? ' · ' + m.lead_segment : '')),
    el('h3', {}, 'Subject'),
    subject,
    el('div', { class: 'row', style: 'margin:10px 0 4px' }, el('h3', { class: 'grow', style: 'margin:0' }, 'Body'), counter),
    body,
    el('h3', {}, 'Footer (appended automatically at send)'),
    el('pre', {}, footer || '(footer preview unavailable)'),
    el('div', { class: 'row', style: 'margin-top:14px' }, approveBtn, sendBtn, saveBtn, el('span', { class: 'grow' }), rejectBtn)
  );
  $('#modal-wrap').classList.remove('hidden');
}

/* ---------- Replies tab ---------- */

async function loadReplies() {
  const params = new URLSearchParams();
  const cls = $('#r-class').value;
  if (cls) params.set('classification', cls);
  const data = await api('/replies?' + params.toString());
  const list = $('#replies-list');
  if (data.replies.length === 0) {
    list.replaceChildren(el('p', { class: 'empty' }, 'No replies yet.'));
    return;
  }
  list.replaceChildren(...data.replies.map((r) => el('div', { class: 'card' },
    el('div', { class: 'row' },
      el('b', {}, r.lead_company || r.from_email || ''),
      chip(r.classification || 'unclear', 'cl-'),
      r.confidence !== null && r.confidence !== undefined ? el('span', { class: 'chip' }, Math.round(r.confidence * 100) + '%') : null,
      el('span', { class: 'muted small', style: 'margin-left:auto' }, fmtDate(r.created_at))),
    el('div', { class: 'muted small' }, 'From: ' + (r.from_email || '') +
      (r.lead_first_name || r.lead_last_name ? ' (' + [r.lead_first_name, r.lead_last_name].filter(Boolean).join(' ') + ')' : '')),
    r.summary ? el('div', { style: 'margin:6px 0' }, r.summary) : null,
    el('details', {}, el('summary', { class: 'muted small' }, 'Reply text'), el('pre', {}, r.body || '')),
    r.suggested_reply ? el('div', {},
      el('h3', {}, 'Suggested reply (never auto-sent)'),
      el('pre', {}, r.suggested_reply),
      el('button', { onclick: async () => {
        try { await navigator.clipboard.writeText(r.suggested_reply); toast('Copied - paste into Zoho Mail'); }
        catch { toast('Copy failed', true); }
      } }, 'Copy reply')) : null,
    r.lead_id ? el('div', { class: 'row', style: 'margin-top:8px' },
      el('button', { onclick: () => openLead(r.lead_id) }, 'Open lead')) : null
  )));
}

/* ---------- Suppression tab ---------- */

async function loadSuppression() {
  const data = await api('/suppression');
  const tbody = $('#sup-table tbody');
  if (data.suppression.length === 0) {
    tbody.replaceChildren(el('tr', {}, el('td', { colspan: '5', class: 'empty' }, 'Suppression list is empty.')));
    return;
  }
  tbody.replaceChildren(...data.suppression.map((s) => el('tr', { style: 'cursor:default' },
    el('td', {}, s.kind),
    el('td', {}, s.value),
    el('td', {}, s.reason),
    el('td', { class: 'muted small' }, fmtDate(s.created_at)),
    el('td', {}, el('button', { class: 'danger small', onclick: async () => {
      if (!confirm('Remove ' + s.value + ' from the suppression list? It becomes contactable again.')) return;
      await api('/suppression/' + s.id, { method: 'DELETE' });
      toast('Removed');
      await loadSuppression();
    } }, 'Remove'))
  )));
}

/* ---------- Tabs / init ---------- */

const loaders = {
  pipeline: loadLeads,
  drafts: loadDrafts,
  replies: loadReplies,
  suppression: loadSuppression,
  add: async () => {},
};

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('nav button').forEach((b) => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('main > section').forEach((s) => s.classList.toggle('hidden', s.id !== 'tab-' + tab));
  loaders[tab]().catch((err) => { if (String(err.message) !== 'Unauthorized') toast(err.message, true); });
}

function fillSelect(select, values) {
  for (const v of values) select.append(el('option', { value: v }, v));
}

async function boot() {
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  await refreshStats();
  switchTab(state.tab);
}

fillSelect($('#f-status'), LEAD_STATUSES);
fillSelect($('#f-segment'), SEGMENTS);
fillSelect($('#r-class'), CLASSIFICATIONS);

$('#tabs').addEventListener('click', (e) => {
  const tab = e.target && e.target.dataset && e.target.dataset.tab;
  if (tab) switchTab(tab);
});
$('#f-apply').addEventListener('click', () => { state.page = 0; loadLeads().catch((e) => toast(e.message, true)); });
$('#f-q').addEventListener('keydown', (e) => { if (e.key === 'Enter') { state.page = 0; loadLeads().catch((er) => toast(er.message, true)); } });
$('#f-advance').addEventListener('click', async () => {
  try {
    toast('Running pipeline…');
    const r = await api('/pipeline/advance', { method: 'POST', body: {} });
    toast('Scored ' + r.scored + ', drafted ' + r.drafted + (r.errors.length ? ', ' + r.errors.length + ' error(s)' : ''));
    await Promise.all([loadLeads(), refreshStats()]);
  } catch (err) { toast(err.message, true); }
});
$('#page-prev').addEventListener('click', () => { if (state.page > 0) { state.page--; loadLeads(); } });
$('#page-next').addEventListener('click', () => {
  if ((state.page + 1) * state.pageSize < state.total) { state.page++; loadLeads(); }
});
$('#drafts-refresh').addEventListener('click', () => loadDrafts().catch((e) => toast(e.message, true)));
$('#replies-refresh').addEventListener('click', () => loadReplies().catch((e) => toast(e.message, true)));
$('#s-add').addEventListener('click', async () => {
  try {
    const value = $('#s-value').value.trim();
    if (!value) { toast('Enter a value', true); return; }
    await api('/suppression', { method: 'POST', body: { kind: $('#s-kind').value, value, reason: $('#s-reason').value.trim() || 'manual' } });
    $('#s-value').value = ''; $('#s-reason').value = '';
    toast('Suppressed');
    await loadSuppression();
  } catch (err) { toast(err.message, true); }
});
$('#a-save').addEventListener('click', async () => {
  try {
    const lead = {
      email: $('#a-email').value.trim(),
      firstName: $('#a-first').value.trim(),
      lastName: $('#a-last').value.trim(),
      role: $('#a-role').value.trim(),
      company: $('#a-company').value.trim(),
      companyWebsite: $('#a-website').value.trim(),
      industry: $('#a-industry').value.trim(),
      source: $('#a-source').value,
      notes: $('#a-notes').value.trim(),
    };
    if (!lead.email) { toast('Email is required', true); return; }
    const r = await api('/leads', { method: 'POST', body: { leads: [lead] } });
    const row = r.results[0];
    $('#a-result').textContent = row.result + (row.domainExists ? ' (another contact at this domain exists)' : '');
    if (row.result === 'inserted') {
      ['#a-email','#a-first','#a-last','#a-role','#a-company','#a-website','#a-industry','#a-notes'].forEach((s) => { $(s).value = ''; });
      toast('Lead added');
      await refreshStats();
    } else {
      toast('Not added: ' + row.result, true);
    }
  } catch (err) { toast(err.message, true); }
});
$('#logout').addEventListener('click', lock);
$('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  state.token = $('#login-token').value.trim();
  try {
    await api('/stats');
    localStorage.setItem('outreach_token', state.token);
    $('#login-token').value = '';
    $('#login-error').classList.add('hidden');
    await boot();
  } catch {
    $('#login-error').textContent = 'That key was rejected.';
    $('#login-error').classList.remove('hidden');
  }
});

if (state.token) {
  boot();
} else {
  $('#login').classList.remove('hidden');
}

/* Keep stats fresh while the tab is open. */
setInterval(() => { if (state.token && !document.hidden) refreshStats(); }, 60000);
</script>
</body>
</html>
